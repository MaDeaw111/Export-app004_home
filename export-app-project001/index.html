<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WICHAI.AGRI-TRADE - Export Ops Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif; background-color: #F9FAFB; }
        .heat-0 { background-color: #FFFFFF; }
        .heat-1 { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .heat-2 { background-color: #059669; color: #ffffff; }
        .heat-3 { background-color: #3f3f25; color: #ffffff; }
        .bg-stripe { background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.25), rgba(255,255,255,0.25) 10px, transparent 10px, transparent 20px); }
        .heat-1.bg-stripe { background-image: repeating-linear-gradient(45deg, rgba(6, 95, 70, 0.1), rgba(6, 95, 70, 0.1) 10px, transparent 10px, transparent 20px); }
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col">

    <!-- Top Navigation -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16">
            <div class="flex items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-emerald-600 text-white flex items-center justify-center font-bold">WA</div>
                    <span class="font-bold text-lg text-gray-900 tracking-tight">WICHAI.AGRI-TRADE CO.,LTD</span>
                </div>
                <div class="ml-10 flex space-x-8">
                    <button onclick="switchView('dashboard')" id="nav-dashboard" class="nav-btn border-emerald-500 text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors">Master Logistics</button>
                    <button onclick="switchView('calendar')" id="nav-calendar" class="nav-btn border-transparent text-gray-500 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors">Stuffing Calendar</button>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs font-semibold text-emerald-700 bg-emerald-50 px-2 py-1 rounded-md border border-emerald-200">Export Ops Team</span>
                <span class="h-8 w-8 rounded-full bg-gray-100 flex items-center justify-center text-sm font-medium text-gray-600 border border-gray-200">JD</span>
            </div>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-8">
        
        <!-- ========================================== -->
        <!-- VIEW 1: MASTER LOGISTICS & EXECUTION       -->
        <!-- ========================================== -->
        <div id="view-dashboard" class="max-w-7xl mx-auto space-y-6">
            
            <!-- 1. ANALYTICS KPI CARDS -->
            <div class="grid grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <p class="text-sm font-medium text-gray-500">Total Executed Shipments</p>
                    <p class="text-3xl font-bold text-gray-900 mt-2">142</p>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <p class="text-sm font-medium text-gray-500">Active Containers</p>
                    <p class="text-3xl font-bold text-gray-900 mt-2">84</p>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <p class="text-sm font-medium text-gray-500">Total Export Volume (MT)</p>
                    <p class="text-3xl font-bold text-gray-900 mt-2">2,650 MT</p>
                </div>
            </div>

            <!-- 2. INTERACTIVE EXPORT MOVEMENTS WORLD MAP -->
            <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                <h2 class="text-sm font-bold text-gray-700 mb-4 uppercase">Export Movements Map</h2>
                <div class="h-64 bg-slate-50 rounded-lg border border-dashed border-gray-300 flex items-center justify-center relative">
                    <svg viewBox="0 0 800 400" class="w-full h-full opacity-60">
                        <path d="M50 50 L750 50 L750 350 L50 350 Z" fill="#f1f5f9" stroke="#cbd5e1"/>
                        <circle cx="200" cy="150" r="10" fill="#059669" class="animate-pulse"/> <!-- China -->
                        <circle cx="250" cy="120" r="6" fill="#059669"/> <!-- Japan -->
                        <circle cx="500" cy="100" r="4" fill="#059669"/> <!-- Neth -->
                    </svg>
                    <p class="absolute text-gray-400 text-xs font-semibold">WORLD MAP VISUALIZATION</p>
                </div>
            </div>

            <!-- 3. ADVANCED OPERATIONAL FILTERS -->
            <div class="flex gap-4 bg-white p-4 rounded-lg border border-gray-100 shadow-sm">
                <select id="filter-customer" onchange="filterTable()" class="text-sm border-gray-300 rounded-lg p-2 border">
                    <option value="">All Customers</option>
                    <option value="AgriCorp China">AgriCorp China</option>
                    <option value="Global Feed Mills">Global Feed Mills</option>
                </select>
                <select id="filter-product" onchange="filterTable()" class="text-sm border-gray-300 rounded-lg p-2 border">
                    <option value="">All Products</option>
                    <option value="Tapioca Hard Pellet">Tapioca Hard Pellet</option>
                </select>
                <select id="filter-country" onchange="filterTable()" class="text-sm border-gray-300 rounded-lg p-2 border">
                    <option value="">All Destinations</option>
                    <option value="China">China</option>
                </select>
            </div>

            <!-- 4. MASTER LOGISTICS TABLE -->
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Customer</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">PO</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">DI Number</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Product</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Logistics</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Action</th>
                        </tr>
                    </thead>
                    <tbody id="shipment-table-body" class="divide-y divide-gray-100">
                        <!-- Data rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- VIEW 2: CALENDAR -->
        <div id="view-calendar" class="max-w-7xl mx-auto hidden">
            <div class="text-center text-gray-500 py-20">Calendar View (Placeholder)</div>
        </div>
    </main>

    <script>
        const shipments = [
            { cust: 'AgriCorp China', po: 'PO-10492', di: 'DI-2023-8994', prod: 'Tapioca Hard Pellet', log: 'MSC EMMA / V.302A', status: 'Issue Logged', stuffing: '#', docs: '' },
            { cust: 'Global Feed Mills', po: 'PO-10498', di: 'DI-2023-9005', prod: 'Tapioca Hard Pellet', log: 'CMA CGM LEO / V.99B', status: 'In Progress', stuffing: '#', docs: '#' }
        ];

        function renderTable(data) {
            const body = document.getElementById('shipment-table-body');
            body.innerHTML = data.map(item => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 text-sm font-semibold text-gray-900">${item.cust}</td>
                    <td class="px-6 py-4 text-sm text-gray-500 font-mono">${item.po}</td>
                    <td class="px-6 py-4 text-sm font-mono font-medium text-gray-900">${item.di}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${item.prod}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${item.log}</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 text-xs font-semibold rounded-full ${item.status === 'Issue Logged' ? 'bg-red-100 text-red-800' : 'bg-blue-100 text-blue-800'}">${item.status}</span></td>
                    <td class="px-6 py-4 text-right flex justify-end gap-2">
                        <button class="px-2 py-1 ${item.stuffing ? 'bg-emerald-50 text-emerald-700' : 'bg-gray-50 text-gray-400'} border rounded text-[10px] font-bold">Stuffing Rep.</button>
                        <button class="px-2 py-1 ${item.docs ? 'bg-emerald-50 text-emerald-700' : 'bg-gray-50 text-gray-400'} border rounded text-[10px] font-bold">All Ship Doc</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterTable() {
            const cust = document.getElementById('filter-customer').value;
            const filtered = shipments.filter(s => cust === "" || s.cust === cust);
            renderTable(filtered);
        }

        function switchView(viewId) {
            ['dashboard', 'calendar'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+viewId).classList.remove('hidden');
        }

        renderTable(shipments);
    </script>
</body>
</html>
